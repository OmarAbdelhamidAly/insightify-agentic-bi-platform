# ══════════════════════════════════════════════════════════════
#  Autonomous Data Analyst Agent — Docker Compose Stack
# ══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: analyst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: analyst_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d analyst_agent" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: analyst-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (Vector DB) ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: analyst-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    # Note: Official Qdrant image is minimal and lacks curl/wget. 
    # We rely on 'service_started' condition below.

    # ── FastAPI Application ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyst-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Use internal service names directly to avoid .env overrides from host
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ENV: ${ENV:-development}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-64-char-string}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      GROCK_API_KEY: ${GROCK_API_KEY:-}
      AES_KEY: ${AES_KEY:-Y2hhbmdlLW1lLXRvLWEtcmFuZG9tLTMyLWJ5dGVz}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:3000","http://localhost:8000"]'}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - tenant_uploads:/tmp/tenants
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Celery Worker ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: analyst-worker
    restart: unless-stopped
    environment:
      # Use internal service names directly to avoid .env overrides from host
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      ENV: ${ENV:-development}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-64-char-string}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      GROCK_API_KEY: ${GROCK_API_KEY:-}
      AES_KEY: ${AES_KEY:-Y2hhbmdlLW1lLXRvLWEtcmFuZG9tLTMyLWJ5dGVz}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:3000","http://localhost:8000"]'}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - tenant_uploads:/tmp/tenants
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "celery -A app.worker inspect ping || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

# ── Named Volumes ──────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  qdrantdata:
    driver: local
  tenant_uploads:
    driver: local
