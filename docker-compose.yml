# ══════════════════════════════════════════════════════════════
#  Autonomous Data Analyst Agent — 4-Pillar Microservices Stack
# ══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL (Metadata) ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: analyst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: analyst_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analyst_agent"]
      interval: 10s

  # ── Redis (Message Broker & Cache) ──────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: analyst-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  # ── Qdrant (Vector DB for RAG) ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: analyst-qdrant
    restart: unless-stopped
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrantdata:/qdrant/storage]

  # ── Ollama (Local LLM Engine - Disabled for Memory) ───────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: analyst-ollama
  #   restart: unless-stopped
  #   ports: ["11434:11434"]
  #   volumes: [ollamadata:/root/.ollama]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434"]
  #     interval: 10s

  # ── API Gateway (Entry Point) ───────────────────────────────
  api:
    build: { context: ./services/api, dockerfile: Dockerfile }
    container_name: analyst-api
    restart: unless-stopped
    ports: ["8002:8000"]
    env_file: [./services/api/.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - tenant_uploads:/tmp/tenants
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  # ── Layer 2: Governance Layer ───────────────────────────────
  governance:
    build: { context: ./services/governance, dockerfile: Dockerfile.worker }
    container_name: analyst-governance
    restart: unless-stopped
    env_file: [./services/governance/.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - tenant_uploads:/tmp/tenants
    command: ["celery", "-A", "app.worker", "worker", "-Q", "governance", "--loglevel=info", "--concurrency=2"]
    depends_on: [redis, postgres]

  # ── Layer 3: The 4 Execution Pillars ────────────────────────

  worker-sql:
    build: { context: ./services/worker-sql, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-sql
    restart: unless-stopped
    env_file: [./services/worker-sql/.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - tenant_uploads:/tmp/tenants
    command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.sql,pillar.sqlite,pillar.postgresql", "--loglevel=info", "--concurrency=4"]
    depends_on: [redis, postgres]

  worker-csv:
    build: { context: ./services/worker-csv, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-csv
    restart: unless-stopped
    env_file: [./services/worker-csv/.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - tenant_uploads:/tmp/tenants
    command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.csv", "--loglevel=info", "--concurrency=4"]
    depends_on: [redis]

  worker-json:
    build: { context: ./services/worker-json, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-json
    restart: unless-stopped
    env_file: [./services/worker-json/.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - tenant_uploads:/tmp/tenants
    command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.json", "--loglevel=info", "--concurrency=4"]
    depends_on: [redis, postgres]

  worker-pdf:
    build: { context: ./services/worker-pdf, dockerfile: Dockerfile.worker }
    container_name: analyst-worker-pdf
    restart: unless-stopped
    env_file: [./services/worker-pdf/.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analyst_agent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - tenant_uploads:/tmp/tenants
    command: ["celery", "-A", "app.worker", "worker", "-Q", "pillar.pdf", "--loglevel=info", "--concurrency=4"]
    depends_on: [redis, postgres]

  # ── Layer 4: Export Service ─────────────────────────────────
  exporter:
    build: { context: ./services/exporter, dockerfile: Dockerfile.worker }
    container_name: analyst-exporter
    restart: unless-stopped
    env_file: [./services/exporter/.env]
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - tenant_uploads:/tmp/tenants
    command: ["celery", "-A", "app.worker", "worker", "-Q", "export", "--loglevel=info", "--concurrency=2"]
    depends_on: [redis]

volumes:
  pgdata: { driver: local }
  redisdata: { driver: local }
  qdrantdata: { driver: local }
  ollamadata: { driver: local }
  tenant_uploads: { driver: local }
