name: 🛡️ Project Verification CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🐋 Containerized Testing
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: �️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 💾 Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: 🏗️ Build & Start Services
        run: |
          docker compose build --build-arg BUILDKIT_INLINE_CACHE=1
          docker compose up -d

      - name: ⏳ Wait for Services Health
        run: |
          echo "Waiting for core services to be healthy..."
          for i in {1..60}; do
            HEALTHY_COUNT=$(docker compose ps | grep "healthy" | wc -l)
            echo "Healthy services: $HEALTHY_COUNT"
            if docker compose ps analyst-postgres | grep -q "healthy" && \
               docker compose ps analyst-redis | grep -q "healthy" && \
               docker compose ps analyst-api | grep -q "healthy"; then
              echo "✅ Core services ready!"
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          exit 1

      - name: 🧪 Run Full Test Suite
        run: |
          docker compose exec -T analyst-api pytest tests/

      - name: 📊 Generate Logs on Failure
        if: failure()
        run: docker compose logs > docker-logs.txt

      - name: 📊 Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
          
      - name: 🛑 Cleanup
        if: always()
        run: docker compose down
